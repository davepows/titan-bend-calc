<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DaveScout.IO">
  <title>DaveScout.IO</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { overscroll-behavior: none; background: #151D3B; font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #0d1629;
      padding-top: var(--safe-top);
      height: calc(62px + var(--safe-top));
      display: flex; align-items: flex-end;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    #header-inner { height: 62px; width: 100%; display: flex; align-items: center; padding: 0 16px; }

    #tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: #0d1629; border-top: 1px solid rgba(255,255,255,0.08);
      padding-bottom: var(--safe-bottom);
      display: flex;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 10px 0; gap: 3px; cursor: pointer;
      border: none; background: none;
    }
    .tab-btn .tab-icon { font-size: 22px; }
    .tab-btn .tab-label { font-size: 12px; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase; }
    .tab-btn.active .tab-label { color: #EFAB28; }
    .tab-btn:not(.active) .tab-label { color: rgba(255,255,255,0.35); }

    #main-content {
      padding-top: calc(62px + var(--safe-top));
      padding-bottom: calc(72px + var(--safe-bottom));
      min-height: 100vh;
    }
    #main-content.no-tabbar {
      padding-bottom: 16px;
    }

    .card {
      background: #1e3a70;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .btn-primary {
      background: #EFAB28; color: #151D3B; border-radius: 12px;
      padding: 16px 20px; font-size: 16px; font-weight: 800;
      border: none; cursor: pointer; width: 100%; display: block;
      transition: background 0.15s; font-family: 'Plus Jakarta Sans', sans-serif;
      letter-spacing: 0.02em; text-transform: uppercase;
    }
    .btn-primary:active { background: #d4941f; }
    .btn-secondary {
      background: transparent; color: #EFAB28; border-radius: 12px;
      padding: 14px 20px; font-size: 16px; font-weight: 700;
      border: 2px solid #EFAB28; cursor: pointer; width: 100%;
      display: block; transition: all 0.15s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      letter-spacing: 0.02em; text-transform: uppercase;
    }
    .btn-secondary:active { background: rgba(239,171,40,0.15); }
    .btn-danger {
      background: transparent; color: #f87171; border-radius: 12px;
      padding: 14px 20px; font-size: 16px; font-weight: 700;
      border: 2px solid rgba(248,113,113,0.5); cursor: pointer; width: 100%; display: block;
      font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 0.02em; text-transform: uppercase;
    }

    .form-input {
      width: 100%; padding: 14px 15px; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.15); font-size: 16px; color: #F4F4EE;
      background: rgba(0,0,0,0.3); -webkit-appearance: none;
      transition: border-color 0.15s; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .form-input::placeholder { color: rgba(244,244,238,0.35); }
    .form-input:focus { outline: none; border-color: #EFAB28; box-shadow: 0 0 0 3px rgba(239,171,40,0.2); }
    textarea.form-input { resize: none; line-height: 1.5; }

    /* Team grid */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 10px;
    }
    .team-card {
      border-radius: 16px; cursor: pointer; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 12px 6px 10px; text-align: center; min-height: 96px;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      position: relative;
    }
    .team-card:active { transform: scale(0.95); box-shadow: 0 1px 6px rgba(0,0,0,0.2); }
    .team-card-num {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 22px; line-height: 1;
      letter-spacing: 0.5px;
    }
    .team-card-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px; font-weight: 600; margin-top: 4px;
      width: 100%; padding: 0 8px; opacity: 0.85; box-sizing: border-box;
      line-height: 1.2; text-transform: uppercase; letter-spacing: 0.03em;
      text-align: center; word-break: normal; overflow-wrap: normal;
    }
    .team-card-stars {
      font-size: 9px; margin-top: 4px; letter-spacing: 1px;
    }

    .robot-photo { width: 100%; object-fit: cover; border-radius: 12px; display: none; }
    .photo-placeholder {
      width: 100%; border-radius: 12px;
      background: rgba(0,0,0,0.3);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; border: 2px dashed rgba(239,171,40,0.5); gap: 8px;
      min-height: 160px;
    }
    .photo-placeholder:active { background: rgba(0,0,0,0.45); }

    .star-row { display: flex; gap: 6px; justify-content: center; }
    .star-btn { font-size: 36px; cursor: pointer; padding: 4px; user-select: none; -webkit-user-select: none; border: none; background: none; }

    .stat-box { background: rgba(0,0,0,0.25); border-radius: 12px; padding: 12px; text-align: center; flex: 1; }
    .stat-label { font-size: 13px; color: rgba(244,244,238,0.55); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 26px; font-weight: 800; color: #F4F4EE; margin-top: 2px; }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; justify-content: space-between; }
    .toggle-switch { position: relative; width: 51px; height: 31px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.2); border-radius: 31px; transition: 0.25s; }
    .toggle-slider:before { position: absolute; content: ""; height: 25px; width: 25px; left: 3px; bottom: 3px; background: #F4F4EE; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.4); transition: 0.25s; }
    input:checked + .toggle-slider { background: #EFAB28; }
    input:checked + .toggle-slider:before { transform: translateX(20px); }

    /* Select */
    select.form-input { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23F4F4EE' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 12px center; background-repeat: no-repeat; background-size: 20px; padding-right: 40px; -webkit-appearance: none; }
    select.form-input option { background: #1e3a70; color: #F4F4EE; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: flex-end; }
    .modal-sheet { background: #1e3a70; border-radius: 24px 24px 0 0; width: 100%; padding: 24px 20px; padding-bottom: calc(24px + var(--safe-bottom)); border-top: 1px solid rgba(255,255,255,0.1); }
    .modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; margin: 0 auto 20px; }

    /* Section header */
    .section-label { font-size: 15px; font-weight: 700; color: #EFAB28; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; font-family: 'Plus Jakarta Sans', sans-serif; }

    /* View padding wrapper — increases on iPad */
    .view-pad { padding: 14px 16px 28px; }
    @media (min-width: 768px) { .view-pad { padding: 20px 24px 36px; } }

    /* Detail view header elements */
    .detail-back-label { font-size: 15px; font-weight: 600; }
    .detail-back-icon { width: 22px; height: 22px; }
    .detail-title-text { font-size: 24px; font-weight: 700; letter-spacing: 0.03em; font-family: 'Plus Jakarta Sans', sans-serif; }
    @media (min-width: 768px) {
      .detail-back-label { font-size: 20px; }
      .detail-back-icon { width: 28px; height: 28px; }
      .detail-title-text { font-size: 30px; }
    }

    .field-chip { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.25); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }

    .ranking-badge { display: inline-flex; align-items: center; justify-content: center; background: rgba(68,108,227,0.3); color: #93c5fd; font-weight: 800; font-size: 20px; padding: 6px 16px; border-radius: 10px; }

    /* ── iPad / tablet layout (768px+) ── */
    @media (min-width: 768px) {
      /* Header — taller with centred inner */
      #header { height: calc(76px + var(--safe-top)); }
      #header-inner {
        height: 76px; padding: 0 28px;
        max-width: 1040px; margin: 0 auto; width: 100%;
      }

      /* Tab bar — bigger tap targets */
      .tab-btn { padding: 13px 0 10px; gap: 5px; }
      .tab-btn .tab-icon { font-size: 26px; }
      .tab-btn .tab-label { font-size: 13px; letter-spacing: 0.04em; }
      #tab-bar { padding-bottom: calc(var(--safe-bottom) + 2px); }

      /* Main content — taller offsets + centred on landscape */
      #main-content {
        padding-top: calc(76px + var(--safe-top));
        padding-bottom: calc(90px + var(--safe-bottom));
        max-width: 1040px; margin-left: auto; margin-right: auto;
      }

      /* Teams grid — bigger cards, more breathing room */
      .teams-grid {
        grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
        gap: 13px;
      }
      .team-card { min-height: 116px; padding: 14px 8px 12px; border-radius: 18px; }
      .team-card-num { font-size: 26px; }
      .team-card-name { font-size: 11px; margin-top: 5px; }
      .team-card-stars { font-size: 11px; margin-top: 5px; }

      /* Cards */
      .card { border-radius: 20px; }

      /* Buttons */
      .btn-primary { padding: 18px 24px; font-size: 17px; border-radius: 14px; }
      .btn-secondary { padding: 16px 24px; font-size: 17px; border-radius: 14px; }
      .btn-danger { padding: 16px 24px; font-size: 17px; border-radius: 14px; }

      /* Form inputs */
      .form-input { padding: 16px 18px; font-size: 17px; }

      /* Stat boxes */
      .stat-box { padding: 16px; }
      .stat-label { font-size: 14px; }
      .stat-value { font-size: 30px; }

      /* Section labels */
      .section-label { font-size: 16px; }

      /* Modal sheet — centred on wide screens */
      .modal-overlay { align-items: center; }
      .modal-sheet {
        border-radius: 24px; width: min(560px, 94vw);
        margin: 0 auto; padding-bottom: 28px;
      }
    }
  </style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <!-- Rendered by JS -->
  </div>
</div>

<div id="main-content">
  <!-- Rendered by JS -->
</div>

<div id="tab-bar">
  <!-- Rendered by JS -->
</div>

<script>
// ══════════════════════════════════════════
//  DATABASE (IndexedDB for photos)
// ══════════════════════════════════════════
let db;
function initDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('FRCScout', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('photos')) d.createObjectStore('photos', { keyPath: 'k' });
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = rej;
  });
}
function dbPut(k, dataUrl) {
  return new Promise(res => { const tx = db.transaction('photos','readwrite'); tx.objectStore('photos').put({k,dataUrl}); tx.oncomplete=res; });
}
function dbGet(k) {
  return new Promise(res => { const tx=db.transaction('photos','readonly'); const r=tx.objectStore('photos').get(k); r.onsuccess=()=>res(r.result?.dataUrl||null); r.onerror=()=>res(null); });
}

// ══════════════════════════════════════════
//  LOCAL STORAGE HELPERS
// ══════════════════════════════════════════
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)||'null'); } catch { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};
const getSettings = () => LS.get('frc_settings') || {};
const setSettings = v => LS.set('frc_settings', v);
const getTeams = () => LS.get('frc_teams') || {};
const setTeams = v => LS.set('frc_teams', v);
const getScoutAll = () => LS.get('frc_scout') || {};
const getScout = n => (getScoutAll()[n] || { rating:0, notes:'', fields:{} });
const setScout = (n,d) => { const all=getScoutAll(); all[n]=d; LS.set('frc_scout',all); };
const getTBACache = () => LS.get('frc_tba') || {};
const getImportData = () => LS.get('frc_import') || {};
const setImportData = v => LS.set('frc_import', v);
const setTBACache = v => LS.set('frc_tba', v);
const getColorsCache = () => LS.get('frc_colors') || {};
const setColorsCache = v => LS.set('frc_colors', v);

// ══════════════════════════════════════════
//  APP STATE
// ══════════════════════════════════════════
let S = {
  view: 'teams',   // 'teams' | 'detail' | 'settings' | 'match' | 'insights'
  team: null,
  loadingTBA: false,
  tbaError: null,
  matchData: null,
  loadingMatch: false,
  matchError: null,
  allMatches: null,
  selectedMatchKey: null,
};

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function nav(view, opts={}) {
  // Auto-save notes when leaving detail
  if (S.view === 'detail') {
    const ta = document.getElementById('sc-notes');
    if (ta) { const d=getScout(S.team); d.notes=ta.value; setScout(S.team,d); }
  }
  Object.assign(S, { view, ...opts });
  render();
  document.getElementById('main-content').scrollTop = 0;
  window.scrollTo(0,0);
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function render() {
  renderHeader();
  renderTabBar();
  const mc = document.getElementById('main-content');
  if (S.view === 'detail') { mc.classList.add('no-tabbar'); document.getElementById('tab-bar').style.display='none'; }
  else { mc.classList.remove('no-tabbar'); document.getElementById('tab-bar').style.display='flex'; }

  const footer = `<div style="text-align:center;padding:20px 16px 8px;font-size:11px;font-weight:500;color:rgba(244,244,238,0.25);letter-spacing:0.04em;">Developed by Dave Powers for FRC 6328</div>`;
  if (S.view === 'teams') mc.innerHTML = teamsView();
  else if (S.view === 'detail') { mc.innerHTML = detailView(); loadPhoto(S.team); }
  else if (S.view === 'match') { mc.innerHTML = matchView(); loadMatchPhotos(); }
  else if (S.view === 'insights') mc.innerHTML = insightsView();
  else if (S.view === 'settings') mc.innerHTML = settingsView() + footer;
}

function renderHeader() {
  const settings = getSettings();
  const ev = settings.eventCode ? `<span style="font-size:12px;color:#93c5fd;margin-left:8px;">${settings.eventCode.toUpperCase()}</span>` : '';
  let inner = '';
  if (S.view === 'detail' && S.team) {
    const teams = getTeams();
    const t = teams[S.team] || {};
    const { primary, secondary, textColor } = teamColors(S.team);
    const hdr = document.getElementById('header');
    if (hdr) hdr.style.background = `linear-gradient(135deg, ${primary}, ${secondary})`;
    inner = `
      <button onclick="nav('teams')" style="display:flex;align-items:center;gap:4px;color:${textColor};background:none;border:none;cursor:pointer;padding:8px 0;margin-left:-4px;opacity:0.9;">
        <svg class="detail-back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        <span class="detail-back-label">Teams</span>
      </button>
      <span class="detail-title-text" style="color:${textColor};position:absolute;left:50%;transform:translateX(-50%);">Team ${S.team}</span>
      <div style="width:70px"></div>
    `;
  } else {
    const hdr = document.getElementById('header');
    if (hdr) hdr.style.background = '#162F65';

function teamsView() {
  const teams = getTeams();
  const teamList = Object.values(teams).sort((a,b)=>a.number-b.number);
  const settings = getSettings();
  const hasTeams = teamList.length > 0;
  const scoutAll = getScoutAll();

  // Build rank + RP + avg score lookup from cached TBA rankings
  const tba = getTBACache();
  const rankLookup = {};
  if (tba?.rankings?.rankings) {
    tba.rankings.rankings.forEach(r => {
      const num = parseInt(r.team_key.replace('frc',''));
      const rpAvg = r.sort_orders?.[0] ?? 0;
      const avgScore = r.sort_orders?.[1] ?? null;
      const played = r.matches_played ?? 0;
      rankLookup[num] = {
        rank: r.rank,
        totalRPs: played > 0 ? Math.round(rpAvg * played) : 0,
        avgScore: avgScore != null ? parseFloat(avgScore.toFixed(1)) : null,
      };
    });
  }

  const teamCards = teamList.map(t => {
    const s = scoutAll[t.number] || {};
    const stars = s.rating ? '★'.repeat(s.rating) + '☆'.repeat(5-s.rating) : '';
    const { primary, secondary, textColor } = teamColors(t.number);
    const rk = rankLookup[t.number];
    const rankLine = rk
      ? `<div style="margin-top:4px;display:flex;flex-direction:column;align-items:center;gap:2px;">
           <div style="display:flex;align-items:center;justify-content:center;gap:4px;">
             <span style="font-size:9px;font-weight:700;opacity:0.7;">#${rk.rank}</span>
             <span style="font-size:8px;opacity:0.35;">·</span>
             <span style="font-size:9px;font-weight:700;color:#EFAB28;opacity:0.9;">${rk.totalRPs}RP</span>
           </div>
           ${rk.avgScore != null ? `<span style="font-size:9px;font-weight:600;opacity:0.55;">avg ${rk.avgScore}</span>` : ''}
         </div>`
      : '';
    return `
      <div class="team-card"
        data-num="${t.number}"
        data-name="${esc((t.name||'').toLowerCase())}"
        onclick="openTeam(${t.number})"
        style="background: linear-gradient(145deg, ${primary} 55%, ${secondary}); color: ${textColor};">
        <div class="team-card-num">${t.number}</div>
        <div class="team-card-name" style="font-size:${(()=>{const n=(t.name||'Team '+t.number).length;return n<=10?'10px':n<=14?'9px':n<=18?'8px':'7px';})()};">${esc(t.name||'Team '+t.number)}</div>
        ${stars ? `<div class="team-card-stars" style="opacity:0.9;">${stars}</div>` : ''}
        ${rankLine}
      </div>
    `;
  }).join('');

  const emptyState = hasTeams ? '' : `
    <div class="card" style="padding:32px 24px;text-align:center;margin-bottom:16px;">
      <div style="font-size:52px;margin-bottom:12px;">📋</div>
      <div style="font-family:'Plus Jakarta Sans', sans-serif;font-weight:700;font-size:18px;color:#F4F4EE;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">No Teams Yet</div>
      <div style="font-size:15px;color:rgba(244,244,238,0.55);margin-bottom:20px;">
        ${(!settings.apiKey || !settings.eventCode) ? 'Set up your TBA API key and event code in Settings to auto-load teams, or add them manually.' : 'Tap "Load from TBA" to fetch all teams and their colors.'}
      </div>
      ${(!settings.apiKey || !settings.eventCode) ? `<button class="btn-primary" onclick="nav('settings')" style="margin-bottom:10px;">Go to Settings</button>` : `<button class="btn-primary" onclick="loadTeams()" style="margin-bottom:10px;">${S.loadingTBA?'⏳ Loading...':'📡 Load from TBA'}</button>`}
      <button class="btn-secondary" onclick="showAddTeam()">+ Add Team Manually</button>
    </div>
  `;

  return `
    <div class="view-pad">
      <div style="position:relative;margin-bottom:14px;">
        <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;">🔍</span>
        <input class="form-input" style="padding-left:38px;" type="text" inputmode="text" placeholder="Search by number or name..." oninput="filterTeams(this.value)" id="searchInput">
      </div>

      ${hasTeams ? `
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <button class="btn-primary" style="flex:1;padding:11px;" onclick="loadTeams()">${S.loadingTBA?'⏳ Loading...':'🔄 Refresh from TBA'}</button>
          <button class="btn-secondary" style="width:auto;padding:11px 16px;flex-shrink:0;" onclick="showAddTeam()">+ Add</button>
        </div>
        ${S.tbaError ? `<div style="color:#ef4444;font-size:13px;margin-bottom:10px;padding:10px;background:#fef2f2;border-radius:10px;">${esc(S.tbaError)}</div>` : ''}
        <div class="teams-grid" id="teamsGrid">
          ${teamCards}
        </div>
      ` : emptyState}

      ${!hasTeams && S.tbaError ? `<div style="color:#ef4444;font-size:13px;margin-top:10px;padding:10px;background:#fef2f2;border-radius:10px;">${esc(S.tbaError)}</div>` : ''}
    </div>
  `;
}

function filterTeams(q) {
  const query = q.toLowerCase().trim();
  document.querySelectorAll('#teamsGrid .team-card').forEach(card => {
    const num = (card.dataset.num||'');
    const name = (card.dataset.name||'');
    const show = !query || num.includes(query) || name.includes(query);
    card.style.display = show ? '' : 'none';
  });
}

function showAddTeam() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay'; modal.id = 'addTeamModal';
  modal.onclick = e => { if(e.target===modal) modal.remove(); };
  modal.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 style="font-size:18px;font-weight:700;color:#F4F4EE;margin-bottom:20px;">Add Team Manually</h2>
      <div style="margin-bottom:14px;">
        <label style="font-size:14px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">Team Number *</label>
        <input class="form-input" id="mt-num" type="number" inputmode="numeric" placeholder="e.g. 254">
      </div>
      <div style="margin-bottom:24px;">
        <label style="font-size:14px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">Team Name (optional)</label>

function doAddTeam() {
  const num = parseInt(document.getElementById('mt-num')?.value);
  const name = document.getElementById('mt-name')?.value.trim();
  if (!num || num < 1 || num > 99999) { alert('Please enter a valid team number (1-99999).'); return; }
  const teams = getTeams();
  teams[num] = { number: num, name: name || `Team ${num}`, city:'', state:'', country:'' };
  setTeams(teams);
  document.getElementById('addTeamModal')?.remove();
  render();
}

async function loadTeams() {
  const settings = getSettings();
  if (!settings.apiKey) { alert('Please add your TBA API key in Settings first.'); nav('settings'); return; }
  if (!settings.eventCode) { alert('Please enter an event code in Settings first.'); nav('settings'); return; }
  S.loadingTBA = true; S.tbaError = null; render();
  try {
    const [teamsRes, rankRes, oprRes, colorsRes] = await Promise.all([
      tbaFetch(`/event/${settings.eventCode}/teams/simple`),
      tbaFetch(`/event/${settings.eventCode}/rankings`).catch(()=>null),
      tbaFetch(`/event/${settings.eventCode}/oprs`).catch(()=>null),
      fetch(`https://api.frc-colors.com/v1/event/${settings.eventCode}`).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    const teamMap = {};
    teamsRes.forEach(t => { teamMap[t.team_number] = { number:t.team_number, name:t.nickname, city:t.city, state:t.state_prov, country:t.country }; });
    setTeams(teamMap);
    setTBACache({ rankings: rankRes, oprs: oprRes, fetchedAt: Date.now() });
    if (colorsRes?.teams) setColorsCache(colorsRes.teams);
    S.loadingTBA = false; render();
  } catch(err) {
    S.loadingTBA = false;
    const msg = err.message || String(err);
    if (err instanceof TypeError || msg.toLowerCase().includes('load failed') || msg.toLowerCase().includes('failed to fetch')) {
      S.tbaError = `Network error — check your internet connection and that your API key and event code are entered in Settings.`;
    } else {
      S.tbaError = `Failed: ${msg}`;
    }
    render();
  }
}

// Returns {primary, secondary, textColor} for a team number
function teamColors(num) {
  const cache = getColorsCache();
  const entry = cache[String(num)];
  const primary = entry?.colors?.primaryHex || '#162F65';
  const secondary = entry?.colors?.secondaryHex || '#2F4E94';
  const textColor = colorIsLight(primary) ? '#151D3B' : '#ffffff';
  return { primary, secondary, textColor };
}

// Determine if a hex color is light (for text contrast)
function colorIsLight(hex) {
  const c = hex.replace('#','');
  const r = parseInt(c.substr(0,2),16);
  const g = parseInt(c.substr(2,2),16);
  const b = parseInt(c.substr(4,2),16);
  return (0.299*r + 0.587*g + 0.114*b) > 160;
}

async function tbaFetch(path) {
  const settings = getSettings();
  const r = await fetch(`https://www.thebluealliance.com/api/v3${path}`, { headers: { 'X-TBA-Auth-Key': settings.apiKey } });
  if (!r.ok) throw new Error(`TBA returned ${r.status} for ${path}`);
  return r.json();
}

function buildStatsHTML(num, tba) {
  let rankData = null, oprData = null;
  const key = `frc${num}`;
  if (tba?.rankings?.rankings) {
    const r = tba.rankings.rankings.find(x => x.team_key === key);
    if (r) rankData = { rank: r.rank, w: r.record?.wins??'?', l: r.record?.losses??'?', t: r.record?.ties??'?' };
  }
  if (tba?.oprs?.oprs?.[key] !== undefined) {
    oprData = {
      opr: (tba.oprs.oprs[key]??0).toFixed(1),
      dpr: (tba.oprs.dprs?.[key]??0).toFixed(1),
      ccwm: (tba.oprs.ccwms?.[key]??0).toFixed(1),
    };
  }
  if (!rankData && !oprData) return `
    <div class="card" style="padding:14px;">
      <div class="section-label">Event Stats</div>
      <div style="font-size:15px;color:rgba(244,244,238,0.55);">No stats yet. Refresh from TBA to see rankings and OPR.</div>
    </div>
  `;

  // Calculate event-wide OPR/DPR/CCWM ranks
  let oprRank = 0, dprRank = 0, ccwmRank = 0, totalTeams = 0;
  if (tba?.oprs?.oprs) {
    const oprs = tba.oprs.oprs, dprs = tba.oprs.dprs || {}, ccwms = tba.oprs.ccwms || {};
    const keys = Object.keys(oprs);
    totalTeams = keys.length;
    if (totalTeams > 0) {
      const oprSorted = keys.slice().sort((a,b) => (oprs[b]??0)-(oprs[a]??0));
      oprRank = oprSorted.indexOf(key) + 1;
      const dprSorted = keys.slice().sort((a,b) => (dprs[a]??0)-(dprs[b]??0));
      dprRank = dprSorted.indexOf(key) + 1;
      const ccwmSorted = keys.slice().sort((a,b) => (ccwms[b]??0)-(ccwms[a]??0));
      ccwmRank = ccwmSorted.indexOf(key) + 1;
    }
  }
  const rankBadge = (r, total) => r && total
    ? `<div style="font-size:11px;font-weight:600;color:rgba(244,244,238,0.45);margin-top:3px;">#${r} of ${total}</div>`
    : '';

  const rankSection = rankData ? `
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
      <div class="stat-box" style="padding:10px;"><div class="stat-label">Rank</div><div class="stat-value" style="color:#EFAB28;font-size:24px;">#${rankData.rank}</div></div>
      <div class="stat-box" style="padding:10px;"><div class="stat-label">Record</div><div class="stat-value" style="font-size:22px;">${rankData.w}-${rankData.l}-${rankData.t}</div></div>
    </div>` : '';
  const oprSection = oprData ? `
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <div class="stat-box" style="padding:10px;"><div class="stat-label">OPR</div><div class="stat-value" style="color:#16a34a;font-size:22px;">${oprData.opr}</div>${rankBadge(oprRank,totalTeams)}</div>
      <div class="stat-box" style="padding:10px;"><div class="stat-label">DPR</div><div class="stat-value" style="font-size:22px;">${oprData.dpr}</div>${rankBadge(dprRank,totalTeams)}</div>
      <div class="stat-box" style="padding:10px;"><div class="stat-label">CCWM</div><div class="stat-value" style="font-size:22px;">${oprData.ccwm}</div>${rankBadge(ccwmRank,totalTeams)}</div>
    </div>` : '';

  return `
    <div class="card" style="padding:14px;">
      <div class="section-label">Event Stats</div>
      ${rankSection}${oprSection}
    </div>
  `;
}

function buildFieldHTML(field, value) {
  const id = `cf_${field.name.replace(/\W/g,'_')}`;
  if (field.type === 'toggle') return `

        <span class="toggle-slider"></span>

    </div>`;
  if (field.type === 'select' && field.options) {
    const opts = field.options.split(',').map(o=>o.trim());
    return `
      <div style="margin-bottom:14px;">
        <label style="font-size:15px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">${esc(field.name)}</label>

          <option value="">Select…</option>
          ${opts.map(o=>`<option value="${esc(o)}"${value===o?' selected':''}>${esc(o)}</option>`).join('')}
        </select>
      </div>`;
  }
  if (field.type === 'number') return `
    <div style="margin-bottom:14px;">
      <label style="font-size:15px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">${esc(field.name)}</label>
      <input class="form-input" id="${id}" type="number" inputmode="decimal" value="${esc(value||'')}" placeholder="${esc(field.placeholder||'Enter number…')}" onchange="saveField('${esc(field.name)}', this.value)">
    </div>`;
  return `
    <div style="margin-bottom:14px;">
      <label style="font-size:15px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">${esc(field.name)}</label>
      <input class="form-input" id="${id}" type="text" value="${esc(value||'')}" placeholder="${esc(field.placeholder||'Enter value…')}" onchange="saveField('${esc(field.name)}', this.value)">
    </div>`;
}

function triggerPhoto() { document.getElementById('sc-photo-input')?.click(); }

async function handlePhoto(input) {
  const file = input.files?.[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const compressed = await compressImage(e.target.result, 1000, 0.75);
    await dbPut(`team_${S.team}`, compressed);
    const img = document.getElementById('sc-photo');
    const ph = document.getElementById('sc-photo-ph');
    if (img) { img.src = compressed; img.style.display='block'; }
    if (ph) ph.style.display='none';
  };
  reader.readAsDataURL(file);
}

async function removePhoto() {
  if (!confirm('Remove this photo?')) return;
  await dbPut(`team_${S.team}`, null);
  const img = document.getElementById('sc-photo');
  const ph = document.getElementById('sc-photo-ph');
  if (img) { img.src=''; img.style.display='none'; }
  if (ph) ph.style.display='flex';
}

function compressImage(dataUrl, maxW, quality) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      let w=img.width, h=img.height;
      if (w>maxW) { h=h*maxW/w; w=maxW; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg', quality));
    };
    img.src=dataUrl;
  });
}

function setRating(n) {
  const d=getScout(S.team); d.rating=n; setScout(S.team,d);
  for(let i=1;i<=5;i++) { const el=document.getElementById(`star${i}`); if(el) el.textContent=i<=n?'⭐':'☆'; }
  const lbl=document.getElementById('rating-label'); if(lbl) lbl.textContent=ratingLabel(n);
}

function ratingLabel(n) {
  return ['Not yet rated','Weak','Below Average','Average','Strong','Outstanding!'][n]||'';

// Sort helper for match ordering
function sortMatches(matches) {
  const lvl = { qm: 0, sf: 1, f: 2 };
  return [...matches].sort((a, b) => {
    const la = lvl[a.comp_level] ?? 3, lb = lvl[b.comp_level] ?? 3;
    return la !== lb ? la - lb : a.match_number - b.match_number;
  });
}

async function loadNextMatch() {
  const settings = getSettings();
  if (!settings.apiKey || !settings.eventCode) {
    alert('Configure TBA API key and event code in Settings first.');
    nav('settings'); return;
  }
  S.loadingMatch = true; S.matchError = null; S.matchData = null; render();

  try {
    const raw = await tbaFetch(`/team/frc6328/event/${settings.eventCode}/matches/simple`);
    S.allMatches = sortMatches(raw);

    // Find next unplayed match
    const unplayed = S.allMatches.filter(m => m.alliances.red.score === -1);

    if (unplayed.length === 0) {
      // All done — default to showing the last played match if any
      const played = S.allMatches.filter(m => m.alliances.red.score !== -1);
      if (played.length > 0) {
        S.selectedMatchKey = played[played.length - 1].key;
        await loadMatchByKey(S.selectedMatchKey);
      } else {
        S.matchData = { done: true };
        S.loadingMatch = false; render();
      }
      return;
    }

    S.selectedMatchKey = unplayed[0].key;
    await loadMatchByKey(S.selectedMatchKey);
  } catch(e) {
    S.loadingMatch = false;
    S.matchError = `Failed to load: ${e.message}`;
    render();
  }
}

async function loadMatchByKey(key) {
  S.loadingMatch = true; S.matchError = null; S.selectedMatchKey = key; render();

  try {
    // If allMatches not loaded yet, we can't look up the match
    if (!S.allMatches) {
      S.matchError = 'Match list not loaded. Use "Load Matches" first.';
      S.loadingMatch = false; render(); return;
    }

    const m = S.allMatches.find(x => x.key === key);
    if (!m) {
      S.matchError = 'Match not found.';
      S.loadingMatch = false; render(); return;
    }

    const redTeams = m.alliances.red.team_keys.map(k => parseInt(k.replace('frc', '')));
    const blueTeams = m.alliances.blue.team_keys.map(k => parseInt(k.replace('frc', '')));
    const matchNum = m.match_number;
    const compLevel = m.comp_level;
    const played = m.alliances.red.score !== -1;
    const redScore = played ? m.alliances.red.score : null;
    const blueScore = played ? m.alliances.blue.score : null;

    // Fetch full match for score_breakdown (RPs) + Statbotics prediction in parallel
    let predicted = null;
    let redRPs = null, blueRPs = null;

    const [sbResult, fullResult] = await Promise.allSettled([
      fetch(`https://api.statbotics.io/v3/match/${key}`),
      played ? tbaFetch(`/match/${key}`) : Promise.resolve(null)
    ]);

    if (sbResult.status === 'fulfilled' && sbResult.value?.ok) {
      try { predicted = (await sbResult.value.json()).pred || null; } catch(e) {}
    }

    if (fullResult.status === 'fulfilled' && fullResult.value) {
      try {
        const sb = fullResult.value.score_breakdown;
        if (sb) {
          const calcRPs = (side, won, tied) => {
            const s = sb[side] || {};
            // Primary: TBA provides totalRankingPoints directly (most reliable)
            if (s.totalRankingPoints != null) return s.totalRankingPoints;
            // Fallback: game-agnostic scan for bonus RP boolean fields
            // Covers 2026 REBUILT (energizedBonusRp, superchargedBonusRp, traversalBonusRp)
            // and older years (rp1, rp2, rp3, etc.)
            const base = won ? 3 : tied ? 1 : 0;
            const bonus = Object.keys(s).filter(k =>
              k !== 'totalRankingPoints' &&
              typeof s[k] === 'boolean' &&
              (/rp\d*$/i.test(k) || /rankingpoint/i.test(k) || /bonusrp/i.test(k) || /bonusrank/i.test(k))
            ).reduce((n, k) => n + (s[k] ? 1 : 0), 0);
            return base + bonus;
          };
          const tied = redScore === blueScore;
          redRPs  = calcRPs('red',  redScore  > blueScore, tied);
          blueRPs = calcRPs('blue', blueScore > redScore,  tied);
        }
      } catch(e) {}
    }

    S.matchData = { matchKey: key, matchNum, compLevel, redTeams, blueTeams, predicted, played, redScore, blueScore, redRPs, blueRPs };
    S.loadingMatch = false; render();
  } catch(e) {
    S.loadingMatch = false;
    S.matchError = `Failed to load match: ${e.message}`;
    render();
  }
}

function parseScoutingCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return null;

  // Parse header (handle quoted fields)
  function parseLine(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += c; }
    }
    result.push(cur);
    return result;
  }

  const headers = parseLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseLine(lines[i]);
    const row = {};
    headers.forEach((h, idx) => { row[h.trim()] = (vals[idx] || '').trim(); });
    rows.push(row);
  }

  // Group by team and compute stats
  const byTeam = {};
  for (const r of rows) {
    const team = parseInt(r['Team']);
    if (!team) continue;
    if (!byTeam[team]) byTeam[team] = [];
    byTeam[team].push(r);
  }

  const stats = {};
  for (const [team, matches] of Object.entries(byTeam)) {
    const autoFuels = matches.map(m => parseFloat(m['AutoHubFuelSuccess']) || 0);
    const teleFuels = matches.map(m => parseFloat(m['TotalTeleHubFuelSuccess']) || 0);

    const climbAttempts = matches.filter(m =>
      (parseInt(m['TeleClimbL1'])||0) + (parseInt(m['TeleClimbL2'])||0) + (parseInt(m['TeleClimbL3'])||0) > 0
    ).length;
    const climbSuccesses = matches.filter(m =>
      (parseInt(m['TeleClimbL1Success'])||0) + (parseInt(m['TeleClimbL2Success'])||0) + (parseInt(m['TeleClimbL3Success'])||0) > 0
    ).length;

    const sum = arr => arr.reduce((a,b)=>a+b, 0);
    const avg = arr => arr.length ? (sum(arr)/arr.length) : 0;

    stats[team] = {
      matches: matches.length,
      avgAutoFuel: avg(autoFuels),
      bestAutoFuel: Math.max(...autoFuels),
      avgTeleFuel: avg(teleFuels),
      bestTeleFuel: Math.max(...teleFuels),
      climbAttempts,
      climbSuccesses,
      climbAttemptRate: matches.length ? (climbAttempts / matches.length) : 0,
      climbSuccessRate: climbAttempts ? (climbSuccesses / climbAttempts) : 0,
    };
  }
  return stats;
}

function handleCSVImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const stats = parseScoutingCSV(e.target.result);
    if (!stats || Object.keys(stats).length === 0) {
      alert('Could not parse CSV — make sure it matches the expected format.');
      return;
    }
    setImportData(stats);
    alert(`Imported data for ${Object.keys(stats).length} teams across matches.`);
    nav('insights');
  };
  reader.readAsText(file);
}

  const importData = getImportData();
  const teams = getTeams();
  const tba = getTBACache();
  const hasData = Object.keys(importData).length > 0;
  const sort = S.insightSort || 'avgTeleFuel';
  const dir = S.insightDir || 'desc';

  // Build a quick rank+RP+avgScore lookup from cached TBA rankings
  const rankLookup = {};
  if (tba?.rankings?.rankings) {
    tba.rankings.rankings.forEach(r => {
      const num = parseInt(r.team_key.replace('frc',''));
      const rpAvg = r.sort_orders?.[0] ?? 0;
      const avgScore = r.sort_orders?.[1] ?? null;
      const played = r.matches_played ?? 0;
      rankLookup[num] = {
        rank: r.rank,
        totalRPs: played > 0 ? Math.round(rpAvg * played) : 0,
        avgScore: avgScore != null ? parseFloat(avgScore.toFixed(1)) : null,
      };
    });
  }

  // Build rows merging TBA team names + rankings with import stats
  let rows = [];
  if (hasData) {
    for (const [teamNum, stats] of Object.entries(importData)) {
      const num = parseInt(teamNum);
      const t = Object.values(teams).find(t => t.number == num);
      const rk = rankLookup[num] || {};
      rows.push({ teamNum: num, name: t?.name || '', rank: rk.rank ?? null, totalRPs: rk.totalRPs ?? null, avgScore: rk.avgScore ?? null, ...stats });
    }
    rows.sort((a, b) => {
      const av = a[sort] ?? (sort === 'rank' ? 9999 : 0);
      const bv = b[sort] ?? (sort === 'rank' ? 9999 : 0);
      return dir === 'desc' ? bv - av : av - bv;
    });
  }

  // colBtn: defaultDir lets rank column default to ascending on first click
  const colBtn = (key, label, defaultDir='desc', width='') => {
    const active = sort === key;
    const arrow = active ? (dir === 'desc' ? ' ↓' : ' ↑') : '';
    const nextDir = active ? (dir === 'desc' ? 'asc' : 'desc') : defaultDir;
    return `<th onclick="(function(){S.insightSort='${key}';S.insightDir='${nextDir}';render();})()"
      style="padding:10px 8px;text-align:center;font-size:12px;font-weight:700;color:${active?'#EFAB28':'rgba(244,244,238,0.6)'};cursor:pointer;white-space:nowrap;border-bottom:2px solid rgba(255,255,255,0.08);user-select:none;${width?'width:'+width+';':''}">
      ${label}${arrow}</th>`;
  };

  const climbBadge = (attempts, successes, total) => {
    if (attempts === 0) return `<span style="color:rgba(244,244,238,0.3);font-size:13px;">—</span>`;
    const pct = Math.round((successes/attempts)*100);
    const color = pct >= 75 ? '#16a34a' : pct >= 40 ? '#EFAB28' : '#ef4444';
    return `<div style="font-size:14px;font-weight:700;color:${color};">${successes}/${attempts}</div>
            <div style="font-size:11px;color:rgba(244,244,238,0.45);">${pct}% • ${attempts} of ${total}m</div>`;
  };

  const fuelCell = (avg, best) => `
    <div style="font-size:16px;font-weight:700;color:#F4F4EE;">${avg.toFixed(1)}</div>
    <div style="font-size:11px;color:rgba(244,244,238,0.45);">best ${best}</div>`;

  return `
    <div class="view-pad">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div style="font-size:20px;font-weight:800;color:#F4F4EE;">Insights</div>
          ${hasData ? `<div style="font-size:12px;color:rgba(244,244,238,0.45);">${Object.keys(importData).length} teams · tap column to sort${Object.keys(rankLookup).length > 0 ? ' · ranks from TBA' : ' · load TBA for ranks'}</div>` : ''}
        </div>
        <label style="background:#EFAB28;color:#151D3B;font-size:13px;font-weight:700;padding:9px 14px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:6px;">
          📥 Import CSV
          <input type="file" accept=".csv" style="display:none;" onchange="handleCSVImport(this)">
        </label>
      </div>

      ${!hasData ? `
        <div class="card" style="padding:40px 24px;text-align:center;">
          <div style="font-size:40px;margin-bottom:12px;">📊</div>
          <div style="font-size:17px;font-weight:700;color:#F4F4EE;margin-bottom:8px;">No scouting data yet</div>
          <div style="font-size:14px;color:rgba(244,244,238,0.5);">Import your team's CSV export to see<br>per-team fuel and climb breakdowns.</div>
        </div>
      ` : `
        <div class="card" style="padding:0;overflow:hidden;">
          <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;min-width:360px;">
              <thead>
                <tr style="background:rgba(0,0,0,0.3);">
                  ${colBtn('teamNum','Team','asc','36%')}
                  ${colBtn('rank','RPs','asc','16%')}
                  ${colBtn('avgAutoFuel','Auto','desc','16%')}
                  ${colBtn('avgTeleFuel','Tele','desc','16%')}
                  ${colBtn('climbSuccessRate','Climb','desc','16%')}
                </tr>
              </thead>
              <tbody>
                ${rows.map((r, i) => {
                  const { primary, secondary, textColor } = teamColors(r.teamNum);
                  const rpCell = r.totalRPs != null
                    ? `<div style="font-size:15px;font-weight:700;color:#EFAB28;">${r.totalRPs} RP</div>
                       ${r.avgScore != null ? `<div style="font-size:11px;color:rgba(244,244,238,0.45);">avg ${r.avgScore}</div>` : ''}`
                    : `<span style="color:rgba(244,244,238,0.3);font-size:13px;">—</span>`;
                  return `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);${i%2===0?'background:rgba(0,0,0,0.1);':''}">
                    <td style="padding:10px 8px;">
                      <div style="display:flex;align-items:center;gap:8px;">
                        ${r.rank != null ? `<div style="font-size:12px;font-weight:700;color:rgba(244,244,238,0.35);min-width:22px;text-align:right;">#${r.rank}</div>` : ''}
                        <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,${primary},${secondary});flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                          <span style="font-size:9px;font-weight:800;color:${textColor};line-height:1;text-align:center;">${r.teamNum}</span>
                        </div>
                        <div style="min-width:0;">
                          <div style="font-size:14px;font-weight:700;color:#F4F4EE;">${r.teamNum}</div>
                          ${r.name ? `<div style="font-size:11px;font-weight:600;color:rgba(244,244,238,0.45);text-transform:uppercase;letter-spacing:0.03em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.name}</div>` : ''}
                        </div>
                      </div>
                    </td>
                    <td style="padding:10px 8px;text-align:center;">${rpCell}</td>
                    <td style="padding:10px 8px;text-align:center;">${fuelCell(r.avgAutoFuel, r.bestAutoFuel)}</td>
                    <td style="padding:10px 8px;text-align:center;">${fuelCell(r.avgTeleFuel, r.bestTeleFuel)}</td>
                    <td style="padding:10px 8px;text-align:center;">${climbBadge(r.climbAttempts, r.climbSuccesses, r.matches)}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `}
    </div>
  `;
}

function settingsView() {
  const s = getSettings();
  const fields = s.customFields || [];
  const fieldChips = fields.map((f,i)=>`
    <div class="field-chip">
      <span style="font-size:16px;">${typeIcon(f.type)}</span>
      <div style="flex:1;">
        <span style="font-weight:600;color:#F4F4EE;">${esc(f.name)}</span>
        <span style="font-size:12px;color:rgba(244,244,238,0.45);margin-left:6px;">${f.type}${f.options?` · ${esc(f.options)}`:''}</span>
      </div>
      <button onclick="removeField(${i})" style="color:rgba(248,113,113,0.8);font-size:20px;font-weight:700;background:none;border:none;cursor:pointer;padding:0 4px;">×</button>
    </div>
  `).join('');

  return `
    <div class="view-pad">
      <!-- TBA API -->
      <div class="card" style="padding:18px;margin-bottom:14px;">
        <div class="section-label">The Blue Alliance</div>
        <div style="margin-bottom:12px;">
          <label style="font-size:14px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">API Key</label>
          <input class="form-input" id="set-api" type="text" value="${esc(s.apiKey||'')}" placeholder="Paste your TBA read API key here" autocomplete="off">
        </div>
        <div style="margin-bottom:8px;">
          <label style="font-size:14px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">Event Code</label>
          <input class="form-input" id="set-event" type="text" value="${esc(s.eventCode||'')}" placeholder="e.g. 2026nyny or 2026necmp" autocapitalize="none">
        </div>
        <div style="font-size:14px;color:rgba(244,244,238,0.5);margin-top:8px;line-height:1.5;">
          Need a free API key? Visit <strong>thebluealliance.com/account</strong><br>
          Find event codes at <strong>thebluealliance.com/events/2026</strong>
        </div>
      </div>
      <button class="btn-primary" id="save-set-btn" onclick="saveSettingsFn()" style="margin-bottom:20px;">Save Settings</button>

      <!-- Custom Fields -->
      <div class="card" style="padding:18px;margin-bottom:14px;">
        <div class="section-label">Custom Scouting Fields</div>
        <div style="font-size:14px;color:rgba(244,244,238,0.55);margin-bottom:14px;">Add fields you want to fill in for each team — toggles, dropdowns, numbers, or text.</div>
        ${fieldChips}
        <button class="btn-secondary" onclick="showAddField()" style="margin-top:4px;">+ Add Field</button>
      </div>

      <!-- Data Management -->
      <div class="card" style="padding:18px;margin-bottom:14px;">
        <div class="section-label">Data</div>
        <button class="btn-secondary" onclick="exportData()" style="margin-bottom:10px;">📤 Export Scouting Data (.json)</button>
        <button class="btn-secondary" onclick="document.getElementById('import-input').click()" style="margin-bottom:10px;">📥 Import Scouting Data</button>
        <button class="btn-danger" onclick="clearData()">🗑️ Clear All Data</button>
        <input type="file" id="import-input" accept=".json" style="display:none;" onchange="importData(this)">
      </div>

      <!-- iPad Tip -->
      <div class="card" style="padding:18px;margin-bottom:14px;text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">📱</div>
        <div style="font-weight:700;color:#F4F4EE;margin-bottom:4px;">Use as iPad App</div>
        <div style="font-size:14px;color:rgba(244,244,238,0.55);line-height:1.5;">Open this file in <strong>Safari</strong> on your iPad, then tap the Share button and choose <strong>"Add to Home Screen"</strong> for a full-screen app experience.</div>
      </div>

      <div style="text-align:center;padding:8px 0 4px;font-family:'Plus Jakarta Sans', sans-serif;color:rgba(244,244,238,0.35);font-size:13px;letter-spacing:0.05em;">FRC 6328 · MECHANICAL ADVANTAGE · LITTLETON, MA</div>
    </div>
  `;
}

function typeIcon(t) { return {toggle:'🔘',text:'📝',number:'🔢',select:'📋'}[t]||'📝'; }

function saveSettingsFn() {
  const s = getSettings();
  s.apiKey = document.getElementById('set-api')?.value.trim() || '';
  s.eventCode = document.getElementById('set-event')?.value.trim().toLowerCase() || '';
  setSettings(s);
  const btn = document.getElementById('save-set-btn');
  if (btn) { btn.textContent='✅ Saved!'; setTimeout(()=>{btn.textContent='Save Settings';},1800); }
}

function removeField(i) {
  const s = getSettings();
  s.customFields = (s.customFields||[]);
  s.customFields.splice(i,1);
  setSettings(s);
  render();
}

function showAddField() {
  document.getElementById('addFieldModal')?.remove();
  const modal = document.createElement('div');
  modal.className = 'modal-overlay'; modal.id = 'addFieldModal';
  modal.onclick = e => { if(e.target===modal) modal.remove(); };
  modal.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 style="font-size:18px;font-weight:700;color:#F4F4EE;margin-bottom:20px;">Add Custom Field</h2>
      <div style="margin-bottom:14px;">
        <label style="font-size:14px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">Field Name *</label>
        <input class="form-input" id="nf-name" type="text" placeholder="e.g. Can Climb, Auto Strategy">
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:14px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">Field Type</label>
        <select class="form-input" id="nf-type" onchange="toggleFieldTypeOptions()">
          <option value="toggle">Yes / No Toggle</option>
          <option value="text">Short Text</option>
          <option value="number">Number</option>
          <option value="select">Dropdown Options</option>
        </select>
      </div>
      <div id="nf-opts-div" style="display:none;margin-bottom:14px;">
        <label style="font-size:14px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">Options (comma-separated)</label>
        <input class="form-input" id="nf-opts" type="text" placeholder="Fast, Medium, Slow">
      </div>
      <div id="nf-ph-div" style="display:none;margin-bottom:14px;">
        <label style="font-size:14px;font-weight:600;color:rgba(244,244,238,0.7);display:block;margin-bottom:6px;">Placeholder hint (optional)</label>
        <input class="form-input" id="nf-ph" type="text" placeholder="e.g. Enter count…">
      </div>
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button class="btn-secondary" onclick="document.getElementById('addFieldModal').remove()">Cancel</button>
        <button class="btn-primary" onclick="doAddField()">Add Field</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function toggleFieldTypeOptions() {
  const t = document.getElementById('nf-type')?.value;
  const od = document.getElementById('nf-opts-div');
  const pd = document.getElementById('nf-ph-div');
  if (od) od.style.display = t==='select'?'block':'none';
  if (pd) pd.style.display = (t==='text'||t==='number')?'block':'none';
}

function doAddField() {
  const name = document.getElementById('nf-name')?.value.trim();
  const type = document.getElementById('nf-type')?.value||'text';
  const opts = document.getElementById('nf-opts')?.value.trim();
  const ph = document.getElementById('nf-ph')?.value.trim();
  if (!name) { alert('Please enter a field name.'); return; }
  const s = getSettings(); if(!s.customFields) s.customFields=[];
  const field = { name, type };
  if (type==='select'&&opts) field.options=opts;
  if (ph) field.placeholder=ph;
  s.customFields.push(field);
  setSettings(s);
  document.getElementById('addFieldModal')?.remove();
  render();
}

// ══════════════════════════════════════════
//  EXPORT / IMPORT
// ══════════════════════════════════════════
function exportData() {
  const s = getSettings();
  const blob = new Blob([JSON.stringify({
    version:1, exportedAt: new Date().toISOString(),
    settings: s, teams: getTeams(), scouting: getScoutAll()
  }, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `frc-scout-${s.eventCode||'data'}-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
}

function importData(input) {
  const file = input.files?.[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.scouting) LS.set('frc_scout', data.scouting);
      if (data.teams) setTeams(data.teams);
      if (data.settings) setSettings(data.settings);
      alert('✅ Data imported successfully!');
      render();
    } catch { alert('Failed to import: invalid file.'); }
  };
  reader.readAsText(file);
}

function clearData() {
  if (confirm('Delete all scouting notes, ratings, and team cache? (Photos will remain.)')) {
    localStorage.removeItem('frc_scout');
    localStorage.removeItem('frc_teams');
    localStorage.removeItem('frc_tba');
    render();
  }
}

// ══════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
initDB().then(render);
</script>
</body>
</html>
